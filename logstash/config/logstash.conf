input {
  # Listen for logs from the VirtualBox machine via Syslog
  udp {
    port => 5140
    type => "syslog"
  }
  # Listen for Filebeat if used on the VM
  beats {
    port => 5044
  }
}

filter {
  if [type] == "syslog" {
    grok {
      match => { "message" => "<%{POSINT:priority}>%{SYSLOGTIMESTAMP:timestamp} %{SYSLOGHOST:host} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}" }
    }
    
    # --- Category Identification ---
    if [program] =~ /sshd/ {
       mutate { add_field => { "log_category" => "Authentication" } }
    } else if [program] =~ /apache|nginx|httpd/ {
       mutate { add_field => { "log_category" => "Web Server" } }
    } else if [program] =~ /mysql|postgre|db/ {
       mutate { add_field => { "log_category" => "Database" } }
    } else {
       mutate { add_field => { "log_category" => "System" } }
    }

    # --- Specialized Database Auditing ---
    if [log_category] == "Database" {
       grok {
         match => { "message" => "(?i)%{WORD:db_action} (?:FROM|INTO|UPDATE|TABLE) %{WORD:db_table}" }
         tag_on_failure => ["not_a_simple_query"]
       }
       mutate { add_tag => ["DB_Audit"] }
    }

    # Extract Device Token
    grok {
      match => { "syslog_message" => "TOKEN:%{NOTSPACE:device_token} %{GREEDYDATA:clean_message}" }
      tag_on_failure => ["no_token"]
    }

    if "no_token" not in [tags] {
      mutate {
        replace => { "syslog_message" => "%{clean_message}" }
        add_field => { "device_id" => "%{device_token}" }
      }
    } else {
      mutate { add_field => { "device_id" => "generic-host" } }
    }
  }

  mutate {
    add_field => { "[@metadata][target_index]" => "sma_logs" }
    rename => { "syslog_message" => "message" }
  }
}

output {
  # Forward to Redis for ML/LLM Processing
  redis {
    host => "redis"
    port => 6379
    data_type => "list"
    key => "syslog_stream"
  }

  # Forward directly to Elasticsearch (Centralized DB)
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "sma_logs"
  }

  # Optional: For debugging in the console
  stdout { codec => rubydebug }
}
