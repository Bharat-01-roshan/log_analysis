version: '3.8'

services:
  # Elasticsearch: Centralized Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: logstash_user
    # container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # - ELASTIC_PASSWORD=2W-HFs8RGlThS9id=R9d
      - ELASTIC_PASSWORD=StrongPass123
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || curl -s -k https://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kibana: Log Visualization (Standard ELK)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_USERNAME=logstash_user
      # - ELASTICSEARCH_PASSWORD=2W-HFs8RGlThS9id=R9d
      - ELASTICSEARCH_PASSWORD=StrongPass123
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Logstash: Transport & Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: logstash
    volumes:
      - ./logstash/config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"  # Beats input
      - "5140:5140/udp" # Syslog input
    depends_on:
      - elasticsearch
      - redis

  # Redis: Message Broker (for the ML Pipeline worker)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # Vector: Log Ingestor (UDP 514)
  vector:
    image: timberio/vector:0.31.0-alpine
    container_name: vector
    volumes:
      - ./ingestion/vector.yaml:/etc/vector/vector.yaml:ro
    command: ["--config", "/etc/vector/vector.yaml"]
    ports:
      - "514:514/udp"
    depends_on:
      - redis
